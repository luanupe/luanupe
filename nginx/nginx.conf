worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_body_temp_path /tmp/nginx-client-body;
    proxy_temp_path       /tmp/nginx-proxy;

    sendfile        on;
    keepalive_timeout  65;
    access_log /dev/stdout combined;

    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=3r/s;

    server {
        listen 8080;
        server_name _;
        limit_req_status 429;

        # Public proxy only; cron hits Node on :3000 directly.
        location = /warmup {
            access_log off;
            return 403;
        }

        # VCS / metadata directories
        location ~* /\.(git|svn|hg|bzr)(/|$) {
            access_log off;
            return 404;
        }

        # Dotenv variants (e.g. .env.local); other dotfiles
        location ~* /\.env {
            access_log off;
            return 404;
        }

        location ~* /\.(htaccess|htpasswd|DS_Store|npmrc|yarnrc)(/|$) {
            access_log off;
            return 404;
        }

        # Container / deploy artifacts at repo root
        location ~* ^/(Dockerfile|docker-compose\.ya?ml|\.dockerignore)$ {
            access_log off;
            return 404;
        }

        # SSH key filenames often probed at web root
        location ~* ^/(id_rsa|id_ecdsa|id_ed25519|id_dsa)(\.pub)?$ {
            access_log off;
            return 404;
        }

        # Database / editor backup probes
        location ~* \.(sql|bak|swp|dump)$ {
            access_log off;
            return 404;
        }

        location / {
            limit_req zone=per_ip burst=10 nodelay;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://127.0.0.1:3000;
        }
    }
}
